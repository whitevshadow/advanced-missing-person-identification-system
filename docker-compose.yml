services:
  mongo:
    image: mongo:7
    container_name: ampis_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build: .
    container_name: ampis_app
    ports:
      - "1580:1580" # Host port 1580 -> container port 1580
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=missing_persons_db
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
